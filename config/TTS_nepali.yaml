model:
  transformer:
    conv_filter_size: 1024
    conv_kernel_size:
    - 9
    - 1
    decoder_dropout: 0.2
    decoder_head: 2
    decoder_hidden: 256
    decoder_layer: 6
    encoder_dropout: 0.2
    encoder_head: 2
    encoder_hidden: 256
    encoder_layer: 4
  variance_embedding:
    energy_quantization: log
    n_bins: 256
    pitch_quantization: log
  variance_predictor:
    dropout: 0.5
    filter_size: 256
    kernel_size: 3
path:
  corpus_path: /content/drive/MyDrive/TTSMajorProject/TryingFS2_Apala/FastSpeech2/TTSdata/TTS_nepali
  lexicon_path: lexicon/librispeech-lexicon.txt
  preprocessed_path: ./preprocessed_data/TTS_nepali
  raw_path: /content/drive/MyDrive/TTSMajorProject/TryingFS2_Apala/FastSpeech2/TTSdata/TTS_nepali/wavs
preprocessing:
  audio:
    max_wav_value: 32768.0
    sampling_rate: 22050
  energy:
    feature: frame_level
    normalization: true
  mel:
    mel_fmax: 8000
    mel_fmin: 0
    n_mel_channels: 80
  pitch:
    feature: frame_level
    normalization: true
  stft:
    filter_length: 1024
    hop_length: 256
    win_length: 1024
  text:
    language: nepali
    text_cleaners:
    - basic_cleaners
  val_size: 512
vocoder:
  checkpoint_path: /content/drive/MyDrive/TTSMajorProject/TryingFS2_Apala/FastSpeech2/hifigan/generator_universal.pth.tar
  model: HiFiGAN
  speaker: universal
