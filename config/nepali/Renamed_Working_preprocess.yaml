dataset: "nepali"

# path:
#   corpus_path: "/content/drive/MyDrive/TTSMajorProject/TryingFS2_Apala/FastSpeech2/preprocessed_data/nepali"
#   lexicon_path: null  
#   raw_path: "/content/drive/MyDrive/TTSMajorProject/TryingFS2_Apala/FastSpeech2/TTSdata/TTS_nepali/wavs"
#   preprocessed_path: "/content/drive/MyDrive/TTSMajorProject/TryingFS2_Apala/FastSpeech2/preprocessed_data/nepali"
path:
  corpus_path: /content/drive/MyDrive/TTSMajorProject/TryingFS2_Apala/FastSpeech2/TTSdata/TTS_nepali
  lexicon_path: lexicon/librispeech-lexicon.txt
  preprocessed_path: ./preprocessed_data/nepali
  raw_path: /content/drive/MyDrive/TTSMajorProject/TryingFS2_Apala/FastSpeech2/TTSdata/TTS_nepali/wavs
  
preprocessing:
  val_size: 206  # number of samples for validation; adjust depending on dataset size
  text:
    text_cleaners: ["basic_cleaners"] 
    language: "nepali"  
  audio:
    sampling_rate: 22050
    max_wav_value: 32768.0
  stft:
    filter_length: 1024
    hop_length: 256
    win_length: 1024
  mel:
    n_mel_channels: 80
    mel_fmin: 0
    mel_fmax: 8000  # HiFi-GAN vocoder
  pitch:
    feature: phoneme_level  # can also use frame_level
    normalization: True
  energy:
    feature: phoneme_level
    normalization: True

